name: Build and Release

on:
  push:
    branches: [ "master" ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build on Windows
    runs-on: windows-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Setup .NET 10
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '10.0.x'

    - name: Install Vulkan SDK
      uses: humbletim/install-vulkan-sdk@v1.2
      with:
        version: latest
        cache: true

    - name: Install Dependencies (Windows)
      run: choco install upx -y

    - name: Publish .NET Project
      run: dotnet publish MinecraftPT/MinecraftPT.csproj -c Release -r win-x64 -o ./publish_output
      
    - name: Clean up debug symbols
      shell: pwsh
      run: |
        Get-ChildItem -Path ./publish_output -Include *.pdb, *.dbg -Recurse -File -ErrorAction SilentlyContinue | Remove-Item -Force

    - name: UPX Compress Binary
      run: upx --best --lzma ./publish_output/MinecraftPT.exe

    - name: Compress to 7z
      shell: bash
      run: |
        cd publish_output
        7z a -t7z -mx=9 -mfb=273 -ms=on -m0=lzma2 ../MinecraftPT-win-x64.7z *

    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: MinecraftPT-win-x64.7z
        path: MinecraftPT-win-x64.7z
        retention-days: 1 

  create_release:
    name: Create GitHub Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download All Artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Publish Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: build-${{ github.run_number }}
          name: "Авто-сборка #${{ github.run_number }}"
          body: |
            Автоматическая сборка из ветки `master`.
            Коммит: ${{ github.sha }}
          files: artifacts/*.7z
          prerelease: true